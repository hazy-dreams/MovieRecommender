services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: movierec
      POSTGRES_USER: movierec
      POSTGRES_PASSWORD: movierec
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movierec -d movierec"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
